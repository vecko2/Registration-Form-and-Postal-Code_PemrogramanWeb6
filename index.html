<!DOCTYPE html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Registrasi Mahasiswa</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="page">
			<header class="topbar">
				<div class="brand">
					<h1>Registrasi Mahasiswa</h1>
					<p>Form Pendataan Mahasiswa</p>
				</div>
				<div class="top-actions">
					<button class="btn btn-outline" id="themeToggle" type="button">
						Dark Mode
					</button>
				</div>
			</header>

			<main class="content">
				<!-- Form registrasi utama -->
				<section class="card form-card">
					<h2>Form Registrasi</h2>
					<p class="muted">Semua field wajib diisi.</p>

					<div id="alertBox" class="alert hidden" role="status" aria-live="polite"></div>

					<form id="registrationForm" novalidate>
						<div class="form-grid">
							<div class="form-group">
								<label for="fullName">Nama Lengkap</label>
								<input
									id="fullName"
									name="fullName"
									type="text"
									placeholder="Nama lengkap"
								/>
							</div>
							<div class="form-group">
								<label for="studentId">NRP / NIM</label>
								<input
									id="studentId"
									name="studentId"
									type="text"
									placeholder="Contoh: 0512345678"
								/>
							</div>
							<div class="form-group">
								<label for="program">Program Studi</label>
								<select id="program" name="program">
									<option value="" selected disabled>Pilih program studi</option>
									<option value="Teknik Informatika">Teknik Informatika</option>
									<option value="Sistem Informasi">Sistem Informasi</option>
									<option value="Teknik Elektro">Teknik Elektro</option>
									<option value="Teknik Industri">Teknik Industri</option>
									<option value="Manajemen">Manajemen</option>
									<option value="Lainnya">Lainnya</option>
								</select>
							</div>
							<div class="form-group">
								<label for="batch">Angkatan</label>
								<input
									id="batch"
									name="batch"
									type="number"
									min="2000"
									max="2035"
									placeholder="Contoh: 2024"
								/>
							</div>
							<div class="form-group">
								<label for="email">Email</label>
								<input
									id="email"
									name="email"
									type="email"
									placeholder="nama@email.com"
								/>
							</div>
							<div class="form-group">
								<label for="phone">Nomor HP</label>
								<input
									id="phone"
									name="phone"
									type="text"
									placeholder="Contoh: 081234567890"
								/>
							</div>
							<div class="form-group span-2">
								<label for="address">Alamat</label>
								<textarea
									id="address"
									name="address"
									rows="3"
									placeholder="Alamat lengkap"
								></textarea>
							</div>
							<div class="form-group">
								<label for="city">Kota</label>
								<input
									id="city"
									name="city"
									type="text"
									placeholder="Contoh: Surabaya"
								/>
							</div>
							<div class="form-group">
								<label for="postal">Kode Pos</label>
								<input
									id="postal"
									name="postal"
									type="text"
									placeholder="5 digit kode pos"
								/>
							</div>
						</div>

						<button class="btn btn-primary" type="submit">Daftar</button>
					</form>

					<div id="successCard" class="success-card hidden">
						<h3>Registrasi Berhasil</h3>
						<p>Data mahasiswa tersimpan.</p>
						<div id="successContent" class="success-content"></div>
					</div>
				</section>

				<section class="card postal-card">
					<div class="card-header">
						<h2>Cari Kode Pos</h2>
						<p class="muted">
							Cari berdasarkan Provinsi, Kabupaten/Kota, dan Kecamatan.
						</p>
					</div>

					<form id="postalSearchForm" class="postal-form" novalidate>
						<div class="form-grid compact">
							<div class="form-group">
								<label for="provinceSearch">Provinsi</label>
								<input
									id="provinceSearch"
									name="provinceSearch"
									type="text"
									placeholder="Contoh: Jawa Timur"
								/>
							</div>
							<div class="form-group">
								<label for="citySearch">Kabupaten/Kota</label>
								<input
									id="citySearch"
									name="citySearch"
									type="text"
									placeholder="Contoh: Surabaya"
								/>
							</div>
							<div class="form-group">
								<label for="districtSearch">Kecamatan</label>
								<input
									id="districtSearch"
									name="districtSearch"
									type="text"
									placeholder="Contoh: Sukolilo"
								/>
							</div>
						</div>

						<div class="postal-actions">
							<button class="btn btn-primary" type="submit">
								Cari Kode Pos
							</button>
							<button class="btn btn-outline" type="button" id="copyToForm" disabled>
								Isi ke Form
							</button>
						</div>
					</form>

					<div
						id="postalStatus"
						class="postal-status hidden"
						role="status"
						aria-live="polite"
					></div>
					<div id="postalResult" class="postal-result hidden">
						<div class="badge">Kode Pos</div>
						<strong id="postalValue">-</strong>
						<p id="postalLocation" class="muted"></p>
					</div>
					<p class="hint">
						Gunakan ejaan lengkap, misalnya: Jawa Timur / Surabaya / Sukolilo.
					</p>
				</section>
			</main>
		</div>

		<script src="script.js"></script>
	</body>
</html>
